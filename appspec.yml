version: 0.0
os: linux

files:
  - source: target/learnCICDPipelineProject-0.0.1-SNAPSHOT.jar
    destination: /home/ubuntu/

hooks:
  ApplicationStop:
    - location: scripts/stop_server.sh
      timeout: 60
      runas: ubuntu

  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 60
      runas: ubuntu

  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 60
      runas: ubuntu